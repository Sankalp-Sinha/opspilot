services:
  postgres:
    image: postgres:17-alpine
    container_name: opspilot-postgres

    environment:
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
      POSTGRES_DB: opspilot

    ports:
      - "5433:5432"

    volumes:
      - opspilot_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  opspilot_postgres_data: